services:
  - type: web
    name: dtip
    runtime: python
    pythonVersion: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        scope: run
      - key: ENV
        value: production
      - key: INTASEND_API_KEY
        scope: run
      - key: INTASEND_PUB_KEY
        scope: run
